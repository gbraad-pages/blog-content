name: Trigger Blog Publication

on:
  push:
    branches: [main]
    paths:
      - 'done/**'
  workflow_dispatch:

jobs:
  trigger-blog-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch blog publication workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BLOG_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gbraad-pages/blog/actions/workflows/gh-pages.yml/dispatches \
            -d '{"ref":"main"}'
